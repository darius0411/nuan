<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>暖暖專屬試衣間 V2 (含身體調整)</title>
<style>
  body { font-family: 'PingFang SC', sans-serif; background: #2A1A10; color: #3D2B1F; display: flex; padding: 20px; gap: 30px; height: 100vh; margin: 0; box-sizing: border-box;}
  
  /* 左側：預覽區 */
  .preview-section { flex: 1; display: flex; flex-direction: column; align-items: center; background: #FDF8F4; border-radius: 16px; padding: 20px;}
  .canvas { position: relative; width: 220px; height: 220px; background: white; border: 2px dashed #8B5E3C; overflow: hidden; margin-top: 20px;}
  
  .layer { position: absolute; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; }
  
  /* 右側：控制面板 */
  .controls-section { width: 400px; background: #FDF8F4; padding: 20px; border-radius: 16px; overflow-y: auto; }
  .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #EDD9C8; }
  .control-group h3 { margin-top: 0; color: #8B5E3C; font-size: 16px; margin-bottom: 10px;}
  label { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
  input[type="range"] { flex: 1; margin: 0 10px; accent-color: #8B5E3C;}
  span.val { width: 35px; font-weight: bold; color: #8B5E3C; text-align: right;}

  /* 底部：代碼輸出區 */
  .output-box { margin-top: 20px; width: 100%; height: 120px; background: #3D2B1F; color: #A8C5A0; padding: 10px; font-family: monospace; border: none; border-radius: 8px; resize: none; font-size: 12px;}
</style>
</head>
<body>

<div class="preview-section">
  <h2 style="color:#8B5E3C; margin:0;">1. 視覺預覽區</h2>
  <p style="font-size:13px; color:#666;">（請先調整「身體」，再對齊五官）</p>
  
  <div class="canvas">
    <div class="layer" id="p-body" style="background-image: url('body.png');"></div>
    <div class="layer" id="p-blush" style="background-image: url('blush.png'); z-index:2; opacity:0.7;"></div>
    <div class="layer" id="p-eyel" style="background-image: url('eye_left.png'); z-index:3;"></div>
    <div class="layer" id="p-eyer" style="background-image: url('eye_right.png'); z-index:3;"></div>
    <div class="layer" id="p-ant" style="background-image: url('antennas.png'); z-index:4;"></div>
  </div>
  
  <h2 style="color:#8B5E3C; margin-top:30px;">2. 專屬你的代碼</h2>
  <p style="font-size:13px; color:#666;">滿意後，全選複製下方代碼，去替換 `暖_v2.html` 裡的對應 CSS</p>
  <textarea class="output-box" id="code-output" readonly></textarea>
</div>

<div class="controls-section">
  <h2 style="color:#8B5E3C; margin-top:0;">拉桿控制區</h2>
  
  <div class="control-group">
    <h3>🟢 身體 (地基，請優先調整)</h3>
    <label>寬度 (Width): <input type="range" id="bw" min="50" max="300" value="160"><span class="val" id="vbw">160</span></label>
    <label>高度 (Height): <input type="range" id="bh" min="50" max="300" value="160"><span class="val" id="vbh">160</span></label>
    <label>上下 (Top): <input type="range" id="bt" min="-50" max="250" value="30"><span class="val" id="vbt">30</span></label>
    <label>左右 (Left): <input type="range" id="bl" min="-50" max="250" value="30"><span class="val" id="vbl">30</span></label>
  </div>

  <div class="control-group">
    <h3>👁️ 左眼</h3>
    <label>大小 (Size): <input type="range" id="els" min="5" max="100" value="20"><span class="val" id="vels">20</span></label>
    <label>上下 (Top): <input type="range" id="elt" min="-50" max="250" value="90"><span class="val" id="velt">90</span></label>
    <label>左右 (Left): <input type="range" id="ell" min="-50" max="250" value="65"><span class="val" id="vell">65</span></label>
  </div>

  <div class="control-group">
    <h3>👁️ 右眼</h3>
    <label>大小 (Size): <input type="range" id="ers" min="5" max="100" value="20"><span class="val" id="vers">20</span></label>
    <label>上下 (Top): <input type="range" id="ert" min="-50" max="250" value="90"><span class="val" id="vert">90</span></label>
    <label>左右 (Left): <input type="range" id="erl" min="-50" max="250" value="135"><span class="val" id="verl">135</span></label>
  </div>
  
  <div class="control-group">
    <h3>✨ 觸角</h3>
    <label>大小 (Size): <input type="range" id="ans" min="10" max="150" value="45"><span class="val" id="vans">45</span></label>
    <label>上下 (Top): <input type="range" id="ant" min="-50" max="250" value="0"><span class="val" id="vant">0</span></label>
    <label>左右 (Left): <input type="range" id="anl" min="-50" max="250" value="120"><span class="val" id="vanl">120</span></label>
  </div>

  <div class="control-group" style="border:none;">
    <h3>😊 臉紅</h3>
    <label>寬度 (Width): <input type="range" id="blw" min="10" max="200" value="100"><span class="val" id="vblw">100</span></label>
    <label>高度 (Height): <input type="range" id="blh" min="10" max="100" value="30"><span class="val" id="vblh">30</span></label>
    <label>上下 (Top): <input type="range" id="blt" min="-50" max="250" value="110"><span class="val" id="vblt">110</span></label>
    <label>左右 (Left): <input type="range" id="bll" min="-50" max="250" value="60"><span class="val" id="vbll">60</span></label>
  </div>
</div>

<script>
  const ids = ['bw','bh','bt','bl', 'els','elt','ell', 'ers','ert','erl', 'ans','ant','anl', 'blw','blh','blt','bll'];
  const state = {};

  function update() {
    ids.forEach(id => {
      state[id] = document.getElementById(id).value;
      document.getElementById('v' + id).innerText = state[id];
    });

    document.getElementById('p-body').style.cssText = `width:${state.bw}px; height:${state.bh}px; top:${state.bt}px; left:${state.bl}px; background-image:url('body.png'); z-index:1;`;
    document.getElementById('p-eyel').style.cssText = `width:${state.els}px; height:${state.els}px; top:${state.elt}px; left:${state.ell}px; background-image:url('eye_left.png'); z-index:3;`;
    document.getElementById('p-eyer').style.cssText = `width:${state.ers}px; height:${state.ers}px; top:${state.ert}px; left:${state.erl}px; background-image:url('eye_right.png'); z-index:3;`;
    document.getElementById('p-ant').style.cssText = `width:${state.ans}px; height:${state.ans}px; top:${state.ant}px; left:${state.anl}px; background-image:url('antennas.png'); z-index:4;`;
    document.getElementById('p-blush').style.cssText = `width:${state.blw}px; height:${state.blh}px; top:${state.blt}px; left:${state.bll}px; background-image:url('blush.png'); z-index:2; opacity:0.7;`;

    document.getElementById('code-output').value = `
/* 將以下代碼替換你暖暖 HTML 檔案中的對應圖層設定 */

.body-layer { 
  width: ${state.bw}px; height: ${state.bh}px; top: ${state.bt}px; left: ${state.bl}px; 
  background-image: url('body.png'); z-index: 1; animation: breathe 4s ease-in-out infinite; 
}

.eye-l { 
  width: ${state.els}px; height: ${state.els}px; top: ${state.elt}px; left: ${state.ell}px; 
  background-image: url('eye_left.png'); position: absolute;
}

.eye-r { 
  width: ${state.ers}px; height: ${state.ers}px; top: ${state.ert}px; left: ${state.erl}px; 
  background-image: url('eye_right.png'); position: absolute;
}

.antenna-layer { 
  width: ${state.ans}px; height: ${state.ans}px; top: ${state.ant}px; left: ${state.anl}px; 
  background-image: url('antennas.png'); z-index: 4; animation: glow 3s ease-in-out infinite; 
}

.blush-layer { 
  width: ${state.blw}px; height: ${state.blh}px; top: ${state.blt}px; left: ${state.bll}px; 
  background-image: url('blush.png'); z-index: 2; opacity: 0; transition: opacity 0.5s; 
}
`;
  }

  ids.forEach(id => document.getElementById(id).addEventListener('input', update));
  update();
</script>
</body>
</html>
